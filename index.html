<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="py-5">
    <header>
        <h1 class="mb-4 px-5">Consulta de avances del proyecto</h1>
    </header>
    <main>
        <section>
            <article class="container px-4 px-md-2">
                <fieldset class="border p-3 rounded mb-4">
                    <legend class="w-auto px-2 float-none fs-5 fw-bold text-primary">Ingresa los datos de consulta</legend>
                    <label for="usuario" class="form-label">Usuario</label>
                    <input type="text" name="" id="usuario" class="form-control">
                    <label for="grupo" class="form-label">Grupo</label>
                    <select name="" id="grupo" class="form-control">
                        <option value="mat">Matutino</option>
                        <option value="ves">Vespertino</option>
                    </select>
                    <button id="boton" class="btn-info btn mt-4 form-control">Consultar</button>
                </fieldset>
            </article>
        </section>
        <section>
            <table id="tabla"></table>
        </section>
    </main>

    <script src="busca.js"></script>
</body>

</html>
